<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>حرف ولون - لاعب</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .player-page { max-width: 600px; margin: 0 auto; padding: 16px; }
    .buzz-section { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 30px 0; }
    .buzz-btn { width: 180px; height: 180px; border-radius: 50%; font-size: 1.5rem; background: radial-gradient(circle at 30% 30%, #e67e22, #f39c12); color: white; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 0 20px rgba(241,196,15,0.5); }
    .buzz-btn:active { transform: scale(0.95); }
    .answer-section { width: 100%; }
    .waiting-msg { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .debug-panel { background: #2a2a2a; padding: 8px; margin-top: 16px; border-radius: 8px; font-size: 11px; color: #0f0; font-family: monospace; word-break: break-all; }
    .team-banner { padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 16px; font-weight: bold; }
    .team-banner.red { background: #c0392b; color: white; }
    .team-banner.blue { background: #2980b9; color: white; }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div id="reconnect-overlay"><div class="reconnect-box"><div class="spinner"></div><p>جاري إعادة الاتصال...</p></div></div>

  <div class="player-page">
    <div id="join-screen">
      <div class="game-header">
        <span class="game-logo" style="font-size: 2rem;">حرف ولون</span>
      </div>
      <div class="card">
        <div class="form-group">
          <label class="form-label">اسمك</label>
          <input type="text" id="player-name-input" class="form-input" placeholder="أدخل اسمك" maxlength="20">
        </div>
        <button id="join-btn" class="btn btn-primary btn-block">انضم للعبة</button>
      </div>
    </div>

    <div id="game-screen" class="hidden">
      <div id="team-banner" class="team-banner"></div>
      <div class="top-bar">
        <span id="room-info-display" class="room-info">الغرفة: ---</span>
        <div class="scores-row" style="margin:0; gap:8px;">
          <div class="score-card red"><span class="score-number" id="p-score-red">0</span><div class="score-label">أحمر</div></div>
          <div class="score-card blue"><span class="score-number" id="p-score-blue">0</span><div class="score-label">أزرق</div></div>
        </div>
      </div>
      <div id="player-letters-grid" class="letters-grid mb-2"></div>
      <div id="p-phase-bar" class="phase-bar phase-idle mb-2">انتظر الحكم...</div>
      <div id="p-question-area" class="hidden card mb-2">
        <div class="question-category" id="p-question-category"></div>
        <div class="question-text" id="p-question-text"></div>
        <div style="text-align:center;"><div class="first-letter-badge" id="p-target-letter"></div></div>
      </div>
      <div id="p-timer-section" class="hidden" style="text-align:center; margin-bottom:16px;">
        <div class="timer-circle">
          <svg viewBox="0 0 120 120" style="width:100px;height:100px;">
            <circle cx="60" cy="60" r="50" fill="none" stroke="var(--bg-card2)" stroke-width="8"/>
            <circle id="p-timer-progress" cx="60" cy="60" r="50" fill="none" stroke="var(--green)" stroke-width="8" stroke-dasharray="314" stroke-dashoffset="0"/>
          </svg>
          <div style="position:relative; top:-65px; font-size:1.8rem; font-weight:900;" id="p-timer-text">10</div>
        </div>
      </div>

      <div id="p-buzz-section" class="buzz-section hidden">
        <div class="buzz-emoji">⚡ اضغط أسرع ما يمكن!</div>
        <button id="buzz-btn" class="buzz-btn">🔔 إجابة</button>
      </div>

      <div id="p-answer-section" class="hidden card answer-section">
        <p style="font-weight:700; text-align:center;">🎤 اكتب إجابتك:</p>
        <div class="answer-input-wrapper">
          <input type="text" id="p-answer-input" class="form-input" placeholder="الإجابة..." dir="rtl">
          <button id="submit-answer-btn" class="btn btn-green">إرسال</button>
        </div>
      </div>

      <div id="p-other-buzzed" class="hidden card text-center">
        <p style="color:var(--gold);" id="p-other-buzzed-text">لاعب آخر يجيب...</p>
      </div>

      <div id="p-waiting-msg" class="waiting-msg">
        <span class="emoji">⏳</span>
        <p>انتظر بدء الجولة...</p>
      </div>

      <div id="p-game-ended" class="hidden modal" style="position:relative; background:transparent;">
        <div class="card text-center"><h2>🏆 انتهت اللعبة!</h2>
          <div class="scores-row"><div class="score-card red"><span id="final-score-red">0</span></div><div class="score-card blue"><span id="final-score-blue">0</span></div></div>
          <div id="final-winner-text"></div>
        </div>
      </div>

      <div class="debug-panel" id="debug-panel">🔍 جاهز</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, set, get, update, onValue, push, remove, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
    window.firebaseModules = { initializeApp, getDatabase, ref, set, get, update, onValue, push, remove, serverTimestamp };
    window.firebaseReady = true;
    document.dispatchEvent(new Event('firebase-ready'));
  </script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
  <script src="questions.js"></script>

  <script>
    let myTeam, myName, myId, roomCode;
    let lastState, timerInterval, hasBuzzed = false;

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('join-btn').addEventListener('click', confirmJoin);
    });

    document.addEventListener('firebase-ready', async () => {
      await initFirebase();
      hideReconnecting();
      roomCode = getUrlParam('room');
      myTeam = getUrlParam('team');
      const nameParam = getUrlParam('name');
      
      if (roomCode && myTeam) {
        myName = nameParam ? decodeURIComponent(nameParam) : loadFromStorage('playerName');
        if (!myName) {
          const inputName = document.getElementById('player-name-input').value.trim();
          if (inputName) myName = inputName;
          else {
            myName = prompt("أدخل اسمك:");
            if (!myName) myName = "لاعب";
          }
          saveToStorage('playerName', myName);
        }
        document.getElementById('player-name-input').value = myName;
        console.log("Player name set:", myName);
        myId = getOrCreatePlayerId();
        enterGame();
      } else {
        document.getElementById('join-screen').classList.remove('hidden');
      }
    });

    async function confirmJoin() {
      myName = document.getElementById('player-name-input').value.trim();
      if (!myName) { showToast('أدخل اسمك', 'error'); return; }
      saveToStorage('playerName', myName);
      myId = getOrCreatePlayerId();
      await enterGame();
    }

    async function enterGame() {
      const roomData = await joinRoom(roomCode);
      if (!roomData) { showToast('الغرفة غير موجودة','error'); return; }
      await addPlayerToRoom(roomCode, myTeam, myName, myId);
      document.getElementById('join-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('team-banner').className = `team-banner ${myTeam}`;
      document.getElementById('team-banner').innerHTML = `<span>${myTeam==='red'?'🔴 الأحمر':'🔵 الأزرق'}</span><span>مرحباً ${myName}</span>`;
      document.getElementById('room-info-display').textContent = `الغرفة: ${roomCode}`;
      subscribeToRoom(roomCode, handleGameState);
      showToast(`انضممت للفريق ${myTeam==='red'?'الأحمر':'الأزرق'}`, 'success');
    }

    function handleGameState(state) {
      if (!state) return;
      lastState = state;
      document.getElementById('p-score-red').textContent = state.teams?.red?.score || 0;
      document.getElementById('p-score-blue').textContent = state.teams?.blue?.score || 0;
      renderLetterGrid('player-letters-grid', state.letters, state.currentQuestion?.firstLetter);
      const round = state.currentRound || {};
      const question = state.currentQuestion;
      if (state.status === 'ended') return showGameEnded(state);
      if (question && round.phase !== 'idle') {
        document.getElementById('p-question-area').classList.remove('hidden');
        document.getElementById('p-question-text').textContent = question.question;
        document.getElementById('p-question-category').textContent = question.category || '';
        document.getElementById('p-target-letter').textContent = question.firstLetter;
      } else document.getElementById('p-question-area').classList.add('hidden');
      updatePhaseUI(round);
    }

    function updatePhaseUI(round) {
      const phase = round.phase;
      const isActive = (phase === 'active' && round.timerActive === true);
      const isBuzzedOrAnswered = (phase === 'buzzed' || phase === 'answered');
      const isWaitingOther = (phase === 'waiting_other');
      const buzzedByMe = (round.buzzedPlayer === myName);
      const canBuzz = isActive && !round.buzzedPlayer && !hasBuzzed;

      document.getElementById('debug-panel').innerHTML = `phase: ${phase} | timerActive: ${round.timerActive} | activeTeam: ${round.activeTeam} | canBuzz: ${canBuzz} | buzzedPlayer: ${round.buzzedPlayer}`;

      const phaseBar = document.getElementById('p-phase-bar');
      const timerSec = document.getElementById('p-timer-section');
      const buzzDiv = document.getElementById('p-buzz-section');
      const answerDiv = document.getElementById('p-answer-section');
      const otherDiv = document.getElementById('p-other-buzzed');
      const waitingDiv = document.getElementById('p-waiting-msg');

      phaseBar.className = 'phase-bar mb-2';
      buzzDiv.classList.add('hidden');
      answerDiv.classList.add('hidden');
      otherDiv.classList.add('hidden');
      waitingDiv.classList.add('hidden');
      timerSec.style.display = 'none';

      if (phase === 'idle') {
        phaseBar.classList.add('phase-idle');
        phaseBar.textContent = '⏳ انتظر بدء الجولة';
        waitingDiv.classList.remove('hidden');
        hasBuzzed = false;
      } 
      else if (isActive) {
        phaseBar.classList.add('phase-active');
        phaseBar.textContent = canBuzz ? '⚡ اضغط الزر!' : '⏳ جاري...';
        timerSec.style.display = 'block';
        startClientTimer(round.timerEnd);
        if (canBuzz) {
          buzzDiv.classList.remove('hidden');
          document.getElementById('buzz-btn').disabled = false;
        } else {
          waitingDiv.classList.remove('hidden');
          waitingDiv.querySelector('p').innerText = '⏳ انتظر دورك...';
        }
      }
      else if (isBuzzedOrAnswered) {
        phaseBar.classList.add('phase-buzzed');
        if (buzzedByMe) {
          phaseBar.textContent = '🎤 أنت تجيب الآن!';
          if (phase === 'buzzed') answerDiv.classList.remove('hidden');
          else phaseBar.textContent = '✅ تم الإرسال';
        } else {
          phaseBar.textContent = round.buzzedPlayer ? `🎤 ${round.buzzedPlayer} يجيب...` : 'لاعب يجيب...';
          otherDiv.classList.remove('hidden');
          document.getElementById('p-other-buzzed-text').textContent = `${round.buzzedPlayer || 'لاعب'} يجيب...`;
        }
        timerSec.style.display = 'none';
        stopTimer();
      }
      else if (isWaitingOther) {
        phaseBar.classList.add('phase-idle');
        if (round.activeTeam === myTeam) {
          phaseBar.textContent = '⏳ دور فريقك! اكتب الإجابة';
          answerDiv.classList.remove('hidden');
        } else {
          phaseBar.textContent = `⏳ فريق ${round.activeTeam==='red'?'الأحمر':'الأزرق'} يجيب`;
        }
        timerSec.style.display = 'block';
        startClientTimer(round.timerEnd);
      }
    }

    async function buzz() {
      if (hasBuzzed) return;
      const round = lastState?.currentRound;
      if (!round || round.phase !== 'active' || !round.timerActive) {
        showToast('لا يمكن الضغط الآن', 'error');
        return;
      }
      if (round.buzzedPlayer) { showToast('شخص آخر ضغط قبلك!', 'warning'); return; }
      hasBuzzed = true;
      playBuzz();
      document.getElementById('buzz-btn').disabled = true;
      console.log("Buzzing with name:", myName, "team:", myTeam);
      try {
        await buzzIn(roomCode, myName, myTeam);
        showToast('ضغطت! اكتب إجابتك', 'success');
      } catch(e) { 
        hasBuzzed = false; 
        document.getElementById('buzz-btn').disabled = false;
        console.error(e);
      }
    }

    async function submitPlayerAnswer() {
      const ans = document.getElementById('p-answer-input').value.trim();
      if (!ans) { showToast('اكتب الإجابة', 'error'); return; }
      await submitAnswer(roomCode, ans);
      document.getElementById('p-answer-section').classList.add('hidden');
      showToast('تم الإرسال', 'success');
    }

    function startClientTimer(timerEnd) {
      stopTimer();
      timerInterval = setInterval(() => {
        const r = getTimeRemaining(timerEnd);
        updateTimerDisplay(r);
        if (r <= 0) stopTimer();
      }, 500);
      updateTimerDisplay(getTimeRemaining(timerEnd));
    }
    function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
    function updateTimerDisplay(sec) {
      document.getElementById('p-timer-text').textContent = sec;
      const circ = 314, fraction = sec/10;
      const prog = document.getElementById('p-timer-progress');
      if (prog) prog.style.strokeDashoffset = circ*(1-fraction);
    }
    function showGameEnded(state) {
      document.getElementById('p-waiting-msg').classList.add('hidden');
      document.getElementById('p-game-ended').classList.remove('hidden');
      const rs = state.teams?.red?.score||0, bs = state.teams?.blue?.score||0;
      document.getElementById('final-score-red').textContent = rs;
      document.getElementById('final-score-blue').textContent = bs;
      let txt = rs>bs ? (myTeam==='red'?'🏆 فزت!':'🔴 الأحمر يفوز') : bs>rs ? (myTeam==='blue'?'🏆 فزت!':'🔵 الأزرق يفوز') : '🤝 تعادل';
      document.getElementById('final-winner-text').textContent = txt;
      stopTimer();
    }

    // Attach event listeners
    document.addEventListener('click', (e) => {
      if (e.target.id === 'buzz-btn') buzz();
      if (e.target.id === 'submit-answer-btn') submitPlayerAnswer();
    });
  </script>
</body>
</html>
